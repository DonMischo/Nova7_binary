<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Binär-Rechner</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Orbitron:wght@700;900&family=Share+Tech+Mono&family=Exo+2:wght@400;600&display=swap');

  :root {
    --dark: #06090f;
    --panel: #0a1020;
    --panel2: #0d1828;
    --blue: #00d4ff;
    --green: #39ff14;
    --orange: #ff6b2b;
    --yellow: #ffe066;
    --gray: #4a6080;
    --white: #e8f4ff;
    --border: #1a3a5c;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--dark);
    color: var(--white);
    font-family: 'Exo 2', sans-serif;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 2rem 1rem;
  }

  body::before {
    content: '';
    position: fixed; inset: 0; z-index: 0; pointer-events: none;
    background-image:
      linear-gradient(rgba(0,180,220,0.04) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,180,220,0.04) 1px, transparent 1px);
    background-size: 28px 28px;
  }

  .card {
    position: relative; z-index: 1;
    background: var(--panel);
    border: 1.5px solid var(--blue);
    border-radius: 6px;
    padding: 2rem 2.5rem;
    max-width: 640px;
    width: 100%;
  }

  .card-title {
    font-family: 'Orbitron', monospace;
    font-size: 20px;
    font-weight: 900;
    color: var(--blue);
    letter-spacing: 3px;
    text-shadow: 0 0 16px rgba(0,212,255,0.5);
    text-align: center;
    margin-bottom: 0.25rem;
  }

  .card-sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--gray);
    text-align: center;
    letter-spacing: 2px;
    margin-bottom: 2rem;
  }

  .bits {
    display: flex;
    gap: 8px;
    justify-content: center;
    margin-bottom: 1.5rem;
  }

  .bit-col {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 6px;
  }

  .pow-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    font-weight: 500;
    color: var(--gray);
  }

  .toggle {
    width: 54px;
    height: 76px;
    border-radius: 4px;
    border: 1.5px solid var(--border);
    background: var(--panel2);
    cursor: pointer;
    display: flex;
    align-items: center;
    justify-content: center;
    transition: background 0.15s, border-color 0.15s, box-shadow 0.15s;
    user-select: none;
  }

  .toggle:hover {
    border-color: var(--blue);
  }

  .toggle.on {
    background: rgba(0, 212, 255, 0.12);
    border-color: var(--blue);
    box-shadow: 0 0 12px rgba(0,212,255,0.25);
  }

  .digit {
    font-family: 'Orbitron', monospace;
    font-size: 28px;
    font-weight: 700;
    color: var(--border);
    transition: color 0.15s;
  }

  .toggle.on .digit {
    color: var(--blue);
    text-shadow: 0 0 10px rgba(0,212,255,0.7);
  }

  .bit-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    letter-spacing: 1px;
  }

  .divider {
    height: 1px;
    background: var(--border);
    margin: 1.25rem 0;
  }

  .eq-row {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--gray);
    text-align: center;
    min-height: 20px;
    margin-bottom: 1.25rem;
    letter-spacing: 1px;
  }

  .result-row {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 1rem;
    margin-bottom: 1.5rem;
  }

  .result-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    color: var(--gray);
    letter-spacing: 1px;
  }

  .result-val {
    font-family: 'Orbitron', monospace;
    font-size: 48px;
    font-weight: 900;
    color: var(--green);
    text-shadow: 0 0 20px rgba(57,255,20,0.5);
    min-width: 80px;
    text-align: center;
    transition: color 0.2s;
  }

  .reset-btn {
    display: block;
    margin: 0 auto;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 2px;
    color: var(--gray);
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 6px 18px;
    cursor: pointer;
    transition: all 0.2s;
  }

  .reset-btn:hover {
    border-color: var(--gray);
    color: var(--white);
  }

  .hint {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    color: var(--gray);
    text-align: center;
    margin-top: 1rem;
    letter-spacing: 1px;
  }
</style>
</head>
<body>

<div class="card">
  <div class="card-title">&#9672; BINÄR-RECHNER</div>
  <div class="card-sub">RAUMSTATION NOVA-7 // DATENANALYSE</div>

  <div class="bits" id="bits"></div>

  <div class="divider"></div>

  <div class="eq-row" id="eq">&nbsp;</div>

  <div class="result-row">
    <span class="result-label">DEZIMALWERT =</span>
    <span class="result-val" id="dec">0</span>
  </div>

  <button class="reset-btn" onclick="resetAll()">&#8634; ZURÜCKSETZEN</button>
  <p class="hint">Klick = Bit umschalten &nbsp;·&nbsp; 8 Bit = Zahlen 0 bis 255</p>
</div>

<script>
const POWERS = [128, 64, 32, 16, 8, 4, 2, 1];
let bits = new Array(8).fill(0);

function buildBits() {
  const container = document.getElementById('bits');
  container.innerHTML = '';
  POWERS.forEach((p, i) => {
    const col = document.createElement('div');
    col.className = 'bit-col';
    col.innerHTML =
      '<span class="pow-label">' + p + '</span>' +
      '<div class="toggle" id="t' + i + '" onclick="toggle(' + i + ')">' +
        '<span class="digit" id="d' + i + '">0</span>' +
      '</div>' +
      '<span class="bit-label">Bit ' + (7 - i) + '</span>';
    container.appendChild(col);
  });
}

function toggle(i) {
  bits[i] = bits[i] ? 0 : 1;
  document.getElementById('t' + i).classList.toggle('on', bits[i] === 1);
  document.getElementById('d' + i).textContent = bits[i];
  update();
}

function update() {
  const sum = bits.reduce((acc, b, i) => acc + b * POWERS[i], 0);
  document.getElementById('dec').textContent = sum;
  const parts = bits.map((b, i) => b ? POWERS[i] : null).filter(v => v !== null);
  document.getElementById('eq').textContent =
    parts.length === 0 ? '\u00a0' : parts.join(' + ') + ' = ' + sum;
}

function resetAll() {
  bits = new Array(8).fill(0);
  POWERS.forEach((_, i) => {
    document.getElementById('t' + i).classList.remove('on');
    document.getElementById('d' + i).textContent = '0';
  });
  update();
}

buildBits();
</script>
</body>
</html>
